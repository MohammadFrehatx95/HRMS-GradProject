$kind: http-request
name: Update Position (Admin)
method: PUT
url: '{{baseUrl}}/api/positions/{{positionId}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "title": "Senior Software Engineer",
      "salaryMin": 70000.00,
      "salaryMax": 120000.00,
      "departmentId": 1
    }
