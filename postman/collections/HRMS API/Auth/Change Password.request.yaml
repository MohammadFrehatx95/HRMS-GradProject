$kind: http-request
name: Change Password
method: POST
url: '{{baseUrl}}/api/auth/change-password'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "email": "user@hrms.com",
      "currentPassword": "OldPass1",
      "newPassword": "NewPass1",
      "confirmNewPassword": "NewPass1"
    }
