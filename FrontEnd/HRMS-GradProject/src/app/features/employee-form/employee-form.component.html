<div class="container mt-4" style="max-width: 800px;">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="fw-bold text-secondary mb-0">Add New Employee</h3>
                <a routerLink="/employees"
                    class="btn btn-sm btn-outline-secondary">Back to List</a>
            </div>
        </div>

        <div class="card-body p-4">
            <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

                <div class="row">
                    <!-- Name -->
                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small uppercase">Full
                            Name</label>
                        <input type="text"
                            class="form-control form-control-lg bg-light"
                            formControlName="name" placeholder="John Doe">
                    </div>

                    <!-- Position -->
                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small uppercase">Position</label>
                        <input type="text"
                            class="form-control form-control-lg bg-light"
                            formControlName="position"
                            placeholder="e.g. Software Engineer">
                    </div>
                </div>

                <div class="row">
                    <!-- Department -->
                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small uppercase">Department</label>
                        <input type="text"
                            class="form-control form-control-lg bg-light"
                            formControlName="department"
                            placeholder="e.g. IT Department">
                    </div>

                    <!-- Status -->
                    <div class="col-md-6 mb-4">
                        <label
                            class="form-label fw-bold text-muted small uppercase">Status</label>
                        <select class="form-select form-select-lg bg-light"
                            formControlName="status">
                            <option value="Active">Active</option>
                            <option value="On Leave">On Leave</option>
                            <option value="Terminated">Terminated</option>
                        </select>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="d-flex justify-content-end gap-2 mt-2">
                    <a routerLink="/employees"
                        class="btn btn-light btn-lg px-4 fw-bold text-muted">Cancel</a>

                    <button type="submit"
                        class="btn btn-primary btn-lg px-5 fw-bold"
                        [disabled]="employeeForm.invalid || isLoading">
                        @if (isLoading) {
                        <span class="spinner-border spinner-border-sm me-2"
                            role="status"></span> Saving...
                        } @else {
                        Save Employee
                        }
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
