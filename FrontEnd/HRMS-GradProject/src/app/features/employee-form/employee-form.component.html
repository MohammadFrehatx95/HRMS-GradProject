<div class="container mt-4" style="max-width: 800px;">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="fw-bold text-secondary mb-0">Add New Employee</h3>
                <a routerLink="/employees"
                    class="btn btn-sm btn-outline-secondary">Back to List</a>
            </div>
        </div>

        <div class="card-body p-4">
            <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">First
                            Name</label>
                        <input type="text" class="form-control bg-light"
                            formControlName="firstName">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Last
                            Name</label>
                        <input type="text" class="form-control bg-light"
                            formControlName="lastName">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small">Email</label>
                        <input type="email" class="form-control bg-light"
                            formControlName="email">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Phone
                            Number</label>
                        <input type="text" class="form-control bg-light"
                            formControlName="phoneNumber">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Hire
                            Date</label>
                        <input type="date" class="form-control bg-light"
                            formControlName="hireDate">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small">Department</label>
                        <select class="form-select bg-light"
                            formControlName="departmentId">
                            <option value disabled selected>Select
                                Department</option>
                            @for (dept of departments; track dept.id) {
                            <option [value]="dept.id">{{ dept.name }}</option>
                            }
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label
                            class="form-label fw-bold text-muted small">Position
                            ID</label>
                        <input type="number" class="form-control bg-light"
                            formControlName="positionId"
                            placeholder="Enter Position ID">
                    </div>

                    <div class="col-md-6 mb-4 d-none">
                        <input type="number" formControlName="userId">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary shadow-sm"
                    [disabled]="employeeForm.invalid">Save Employee</button>
            </form>
        </div>
    </div>
