<div class="container mt-4" style="max-width: 800px;">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="fw-bold text-secondary mb-0">Add New Employee</h3>
                <a routerLink="/employees"
                    class="btn btn-sm btn-outline-secondary">Back to List</a>
            </div>
        </div>

        <div class="card-body p-4">
            <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

                @if (employeeForm.get('userId')?.value) {
                <div class="alert alert-info py-2 mb-3">
                    <small><strong>Linked User ID:</strong> {{
                        employeeForm.get('userId')?.value }}</small>
                </div>
                } @else {
                <div class="alert alert-warning py-2 mb-3">
                    <small>No user linked. Navigate here from Register
                        page.</small>
                </div>
                }

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">First
                            Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light"
                            formControlName="firstName"
                            [class.is-invalid]="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Last
                            Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light"
                            formControlName="lastName"
                            [class.is-invalid]="employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label
                            class="form-label fw-bold text-muted small">Email</label>
                        <input type="email" class="form-control bg-light"
                            formControlName="email">
                        <small class="text-muted">Auto-filled from
                            registration</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Phone
                            Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light"
                            formControlName="phoneNumber"
                            [class.is-invalid]="employeeForm.get('phoneNumber')?.invalid && employeeForm.get('phoneNumber')?.touched">
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">User ID
                        <span class="text-danger">*</span></label>
                    <input type="text"
                        class="form-control"
                        formControlName="userId"
                        placeholder="Enter User ID"
                        [class.is-invalid]="employeeForm.get('userId')?.invalid && employeeForm.get('userId')?.touched">
                    <div class="invalid-feedback">
                        User ID is required to link the profile.
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Hire
                            Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control bg-light"
                            formControlName="hireDate"
                            [class.is-invalid]="employeeForm.get('hireDate')?.invalid && employeeForm.get('hireDate')?.touched">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Department <span
                                class="text-danger">*</span></label>
                        <select class="form-select shadow-sm"
                            formControlName="departmentId"
                            [class.is-invalid]="employeeForm.get('departmentId')?.invalid && employeeForm.get('departmentId')?.touched">
                            <option value disabled selected>Select target
                                department...</option>
                            @for (dept of departments; track dept.id) {
                            <option [value]="dept.id">{{ dept.name }}</option>
                            }
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Job Position <span
                                class="text-danger">*</span></label>
                        <select class="form-select shadow-sm"
                            formControlName="positionId"
                            [class.is-invalid]="employeeForm.get('positionId')?.invalid && employeeForm.get('positionId')?.touched">
                            <option value disabled selected>
                                {{ positions.length === 0 ?
                                'Select a Department first...' :
                                'Select Job Position...' }}
                            </option>
                            @for (pos of positions; track pos.id) {
                            <option [value]="pos.id">{{ pos.title }} ({{
                                pos.salaryMin | currency }} - {{ pos.salaryMax |
                                currency }})</option>
                            }
                        </select>
                    </div>
                </div>

                <input type="hidden" formControlName="userId">

                <div class="mt-3">
                    <button type="submit"
                        class="btn btn-primary shadow-sm w-100"
                        [disabled]="isLoading">
                        @if (isLoading) {
                        <span
                            class="spinner-border spinner-border-sm me-2"></span>
                        Saving...
                        } @else {
                        Save Employee
                        }
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
