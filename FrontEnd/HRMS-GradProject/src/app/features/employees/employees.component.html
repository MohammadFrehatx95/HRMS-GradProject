<div class="container-fluid mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employees Directory</h2>
        <a routerLink="/employee-form" class="btn btn-primary">Add New
            Employee</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover border">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Department</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>

                @for (emp of employeesList; track emp.id) {
                <tr>
                    <td>{{ emp.id }}</td>
                    <td>{{ emp.name }}</td>
                    <td>{{ emp.position }}</td>
                    <td>{{ emp.department }}</td>
                    <td>
                        <span class="badge text-bg-primary">{{ emp.status
                            }}</span> </td>

                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
