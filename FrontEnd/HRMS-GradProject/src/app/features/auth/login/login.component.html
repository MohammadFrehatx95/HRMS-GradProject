<div class="login-page d-flex align-items-center justify-content-center vh-100">

    <!-- خلفية متحركة -->
    <div class="bg-blobs" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
        <span class="blob blob-4"></span>
        <span class="blob blob-5"></span>
    </div>
    <!-- شبكة نقاط -->
    <div class="dot-grid" aria-hidden="true"></div>

    <div class="login-card shadow-lg d-flex position-relative">
        
        <!-- Left Side: Form -->
        <div class="login-form-section p-5 d-flex flex-column position-relative">
            <div class="logo-text mt-2 mb-4 d-flex align-items-center gap-2">
                <img src="kawadir-logo.png" alt="Kawadir"
                     style="width: 42px; height: 42px; object-fit: contain;">
                <span style="font-size: 1.5rem; font-weight: 700; color: #8B6914; font-family: Georgia, serif; letter-spacing: 1px;">Kawadir</span>
            </div>

            <div class="form-content mt-4 px-lg-3">
                <div class="text-center mb-5">
                    <h3 class="fw-normal text-dark mb-2">Login to your account</h3>
                    <p class="text-muted small">Access your HR dashboard</p>
                </div>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-medium ms-3 mb-2">Email</label>
                        <input type="email" class="form-control rounded-pill custom-input px-4 py-3 border-0"
                            formControlName="email" placeholder="example@company.com"
                            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                        <div class="invalid-feedback ms-3 mt-1">
                            <span *ngIf="loginForm.get('email')?.errors?.['required']">
                                <i class="bi bi-exclamation-circle me-1"></i>Email is required
                            </span>
                            <span *ngIf="loginForm.get('email')?.errors?.['email']">
                                <i class="bi bi-exclamation-circle me-1"></i>Please enter a valid email address
                            </span>
                        </div>
                    </div>

                    <div class="mb-4 position-relative">
                        <label class="form-label text-secondary small fw-medium ms-3 mb-2">Password</label>
                        <input [type]="isPasswordVisible ? 'text' : 'password'"
                            class="form-control rounded-pill custom-input px-4 py-3 border-0"
                            formControlName="password" placeholder="******************"
                            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        <div class="invalid-feedback ms-3 mt-1">
                            <span *ngIf="loginForm.get('password')?.errors?.['required']">
                                <i class="bi bi-exclamation-circle me-1"></i>Password is required
                            </span>
                            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">
                                <i class="bi bi-exclamation-circle me-1"></i>Password must be at least 6 characters
                            </span>
                        </div>

                        <button class="btn btn-link text-muted position-absolute end-0 top-50 translate-middle-y me-3 text-decoration-none shadow-none"
                            type="button" (click)="togglePasswordVisibility()" tabindex="-1">
                            <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 rounded-pill py-3 fw-medium shadow-sm submit-btn text-dark mb-4"
                        [disabled]="isLoading">
                        @if (isLoading) {
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        }
                        Submit
                    </button>
                </form>
            </div>
        </div>

        <!-- Right Side: Image -->
        <div class="login-image-section p-3 d-none d-lg-block">
            <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" 
                 alt="Team working" class="h-100 w-100 object-fit-cover rounded-4 shadow-sm" style="border-radius: 1.5rem !important;">
        </div>

    </div>
</div>
