<div
    class="login-wrapper vh-100 d-flex align-items-center justify-content-center position-relative">

    <div
        class="position-absolute top-0 start-0 p-4 d-flex align-items-center text-white">
        <i class="bi bi-bezier2 fs-3 me-2"></i>
        <span class="fw-bold fs-5 tracking-wide">Human Resource Management
            System</span>
    </div>

    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5"
        style="width: 100%; max-width: 450px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark mb-2">Sign In</h2>
            <p class="text-secondary small">Welcome back!</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="mb-4">
                <label
                    class="form-label text-secondary fw-semibold small mb-1">Email</label>
                <div class="input-group">
                    <span
                        class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" class="form-control border-start-0 ps-0"
                        formControlName="email"
                        placeholder="example@company.com"
                        [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                </div>
            </div>

            <div class="mb-4">
                <label
                    class="form-label text-secondary fw-semibold small mb-1">Password</label>
                <div class="input-group">
                    <span
                        class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input [type]="isPasswordVisible ? 'text' : 'password'"
                        class="form-control border-start-0 border-end-0 px-0"
                        formControlName="password"
                        placeholder="Enter your password"
                        [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">

                    <button
                        class="btn btn-outline-secondary bg-white border border-start-0 text-muted"
                        type="button" (click)="togglePasswordVisibility()"
                        tabindex="-1">
                        <i class="bi"
                            [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                        id="remember" formControlName="rememberMe">
                    <label class="form-check-label text-secondary small"
                        for="remember">
                        Remember me
                    </label>
                </div>
                <a routerLink="/forgot-password"
                    class="text-decoration-none small fw-semibold text-primary">Forgot
                    password?</a>
            </div>

            <button type="submit"
                class="btn btn-primary w-100 py-2 rounded-3 fw-bold mb-4"
                [disabled]="isLoading">
                @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"
                    role="status" aria-hidden="true"></span>
                }
                Sign In
            </button>

        </form>
    </div>
</div>
