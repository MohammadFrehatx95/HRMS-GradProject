<div class="chat-container card border-0 rounded-4 h-100 overflow-hidden d-flex flex-column" style="max-height: 85vh; background: #fff;">
    <!-- Chat Header -->
    <div class="card-header p-3 border-0 d-flex align-items-center gap-3" style="background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%); border-bottom: 2px solid #d4af37 !important; position: relative; overflow: hidden;">
        <!-- decorative glow -->
        <div style="position: absolute; right: -50px; top: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%); pointer-events: none;"></div>
        
        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); background-size: 200% 200%; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); z-index: 1;">
            <i class="bi bi-stars fs-4 text-white"></i>
        </div>
        <div style="z-index: 1;">
            <h5 class="m-0 fw-bold" style="color: #1e293b; letter-spacing: 0.5px;">{{ 'Kawadir AI Assistant' | t }}</h5>
            <small style="color: #b8860b;"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> {{ 'Online & Ready' | t }}</small>
        </div>
    </div>

    <!-- Chat Messages Body -->
    <div class="card-body p-4 overflow-auto d-flex flex-column gap-3 chat-body" style="background-color: #fcfcfc;" #chatScroll>
        
        @for (msg of messages; track $index) {
            <div class="d-flex w-100" [ngClass]="{'justify-content-end': !msg.isBot}">
                @if (msg.isBot) {
                    <div class="bot-msg-bubble shadow-sm position-relative">
                        <p class="m-0" style="line-height: 1.6; white-space: pre-wrap;">{{ msg.text }}</p>
                        <small class="text-muted d-block mt-2 text-end" style="font-size: 0.7rem;">{{ msg.time }}</small>
                    </div>
                } @else {
                    <div class="user-msg-bubble shadow-sm position-relative">
                        <p class="m-0" style="line-height: 1.6; white-space: pre-wrap;">{{ msg.text }}</p>
                        <small class="text-white opacity-75 d-block mt-2 text-start" style="font-size: 0.7rem;">{{ msg.time }}</small>
                    </div>
                }
            </div>
        }

        @if (isLoading) {
            <div class="d-flex w-100">
                <div class="bot-msg-bubble shadow-sm d-flex gap-2 align-items-center" style="padding: 0.8rem 1.25rem;">
                    <div class="spinner-grow opacity-75" style="width: 0.6rem; height: 0.6rem; color: #d4af37;" role="status"></div>
                    <div class="spinner-grow opacity-75" style="width: 0.6rem; height: 0.6rem; color: #d4af37; animation-delay: 0.2s;" role="status"></div>
                    <div class="spinner-grow opacity-75" style="width: 0.6rem; height: 0.6rem; color: #d4af37; animation-delay: 0.4s;" role="status"></div>
                </div>
            </div>
        }

    </div>

    <!-- Chat Input Footer -->
    <div class="card-footer bg-white p-3 border-top" style="border-color: #e2e8f0 !important;">
        <form (ngSubmit)="sendMessage()" class="d-flex gap-2 position-relative">
            <input type="text" class="form-control rounded-pill px-4 border-0 ai-chat-input" placeholder="{{ 'Ask me anything about HR...' | t }}" [(ngModel)]="userInput" name="userInput" [disabled]="isLoading" autocomplete="off">
            <button type="submit" class="btn rounded-circle d-flex align-items-center justify-content-center shadow-sm send-btn" [disabled]="!userInput.trim() || isLoading">
                <i class="bi bi-send-fill text-white"></i>
            </button>
        </form>
    </div>
</div>
