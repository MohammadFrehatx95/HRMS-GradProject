<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
            <h3 class="fw-bold text-secondary mb-0">Apply for Leave</h3>
        </div>

        <div class="card-body p-4">
            <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">Leave
                        Type</label>
                    <select class="form-select bg-light"
                        formControlName="leaveType">
                        <option value disabled selected>Select Leave
                            Type</option>
                        <option value="Annual">Annual</option>
                        <option value="Sick">Sick</option>
                        <option value="Emergency">Emergency</option>
                        <option value="Unpaid">Unpaid</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Start
                            Date</label>
                        <input type="date" class="form-control bg-light"
                            formControlName="startDate">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">End
                            Date</label>
                        <input type="date" class="form-control bg-light"
                            formControlName="endDate">
                    </div>
                </div>

                <div class="mb-4">
                    <label
                        class="form-label fw-bold text-muted small">Reason</label>
                    <textarea class="form-control bg-light"
                        formControlName="reason" rows="3"
                        placeholder="Explain your reason..."></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a routerLink="/leave"
                        class="btn btn-light px-4 fw-bold text-muted">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 fw-bold"
                        [disabled]="isLoading">
                        {{ isLoading ? 'Submitting...' : 'Submit Request' }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
