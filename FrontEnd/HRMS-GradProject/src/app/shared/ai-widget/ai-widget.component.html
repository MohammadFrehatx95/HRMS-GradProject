<div class="ai-widget-card mb-4 position-relative overflow-hidden rounded-4 shadow-sm">
    <div class="ai-bg-glow"></div>
    <div class="d-flex align-items-center p-4 gap-4 position-relative z-index-1">
        
        <!-- AI Icon Badge -->
        <div class="ai-icon-wrapper flex-shrink-0">
            <div class="ai-icon-inner">
                <i class="bi bi-stars fs-3 text-white" *ngIf="!isLoadingAi"></i>
                <i class="bi bi-robot fs-3 text-white" *ngIf="isLoadingAi"></i>
            </div>
            <!-- Pulse ring -->
            <div class="ai-pulse-ring" *ngIf="isLoadingAi"></div>
        </div>

        <!-- AI Content -->
        <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-1">
                <h6 class="m-0 fw-bold ai-title" style="letter-spacing: 0.5px;">{{ 'Smart AI Assistant' | t }}</h6>
                <span class="badge ai-badge rounded-pill" *ngIf="isLoadingAi">
                    <span class="spinner-grow spinner-grow-sm me-1" style="width: 8px; height: 8px;" role="status"></span>
                    Thinking...
                </span>
            </div>
            <p class="m-0 ai-text fw-medium mt-1">
                {{ aiInsightText }}
            </p>
        </div>
        
        <!-- Refresh Button -->
        <button class="btn btn-sm ai-refresh-btn rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" 
                (click)="refreshAiInsight()" 
                [disabled]="isLoadingAi"
                title="{{ 'Refresh Insight' | t }}">
            <i class="bi bi-arrow-clockwise fs-5" [class.fa-spin]="isLoadingAi"></i>
        </button>
    </div>
</div>
