<div class="sidebar">

    <!-- ── Brand ── -->
    <div class="sidebar-brand">
        <div class="sidebar-logo-wrap">
            <img src="kawadir-logo.png" alt="Kawadir" class="sidebar-logo">
        </div>
        <div class="sidebar-brand-text">
            <span class="sidebar-brand-name">Kawadir</span>
            <span class="sidebar-brand-sub">HR Management</span>
        </div>
    </div>

    <!-- ── User Profile ── -->
    <div class="sidebar-header">
        <div class="user-profile">
            <div class="avatar-initials">{{ initials }}</div>
            <div class="user-info">
                <p class="name">{{ userName }}</p>
                <p class="status"><span class="dot"></span>{{ userRole }}</p>
            </div>
        </div>
    </div>


    <nav class="sidebar-nav">
        <ul>
            <li><a routerLink="/dashboard" routerLinkActive="active"><i
                        class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a routerLink="/my-profile" routerLinkActive="active"><i
                        class="bi bi-person-badge"></i> My Profile</a></li>
            <li><a routerLink="/employees" routerLinkActive="active"><i
                        class="bi bi-people"></i> Employees</a></li>
            <li><a routerLink="/leave" routerLinkActive="active"><i
                        class="bi bi-calendar2-check"></i> Leave
                    Requests</a></li>
            <li><a routerLink="/attendance" routerLinkActive="active"><i
                        class="bi bi-clock-history"></i> Attendance</a></li>
            <li><a routerLink="/salary" routerLinkActive="active"><i
                        class="bi bi-cash-stack"></i> Salaries</a></li>

            @if (isAdmin) {
            <li class="section-title">System Control</li>
            <li><a routerLink="/departments" routerLinkActive="active"><i
                        class="bi bi-diagram-3"></i> Departments</a></li>
            <li><a routerLink="/positions" routerLinkActive="active"><i
                        class="bi bi-briefcase"></i> Positions</a></li>
            <li><a routerLink="/register" routerLinkActive="active"><i
                        class="bi bi-person-plus"></i> Register User </a></li>
            }
        </ul>
    </nav>

    <div class="sidebar-footer mt-auto p-3">
        <button class="btn btn-outline-danger w-100" (click)="onLogout()">
            <i class="bi bi-power"></i> Logout
        </button>
    </div>
</div>
