<div class="face-capture-container">
  <div class="video-wrapper" *ngIf="!capturedImage">
    <video #videoElement autoplay playsinline [hidden]="!isCameraOpen"></video>
    <div class="camera-placeholder" *ngIf="!isCameraOpen">
      <p>Camera is off</p>
      <button (click)="openCamera()" class="btn btn-primary">Open Camera</button>
    </div>
  </div>

  <div class="preview-wrapper" *ngIf="capturedImage">
    <img [src]="capturedImage" alt="Captured Face" />
  </div>

  <canvas #canvasElement style="display: none;"></canvas>

  <div class="actions" *ngIf="isCameraOpen || capturedImage">
    <button *ngIf="isCameraOpen && !capturedImage" (click)="capture()" class="btn btn-success">Capture Face</button>
    <button *ngIf="capturedImage" (click)="retake()" class="btn btn-secondary">Retake</button>
    <button *ngIf="isCameraOpen" (click)="stopCamera()" class="btn btn-danger">Cancel</button>
  </div>
</div>
